name: Release Executa Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "mini-notes-summary-v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build

      - name: Manual JSON-RPC smoke test
        run: npm run test:rpc

      - name: Smoke test describe
        run: |
          cd executas/mini-notes-summary-go
          printf '{"jsonrpc":"2.0","id":1,"method":"describe","params":{}}\n' | go run . > /tmp/describe.json
          grep '"mini-notes-summary"' /tmp/describe.json
          grep '"llm.sample"' /tmp/describe.json

      - name: Build required release assets
        run: npm run package:executa:all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'mini-notes-summary-v0.1.0' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'mini-notes-summary-v0.1.0' }}
          files: |
            release/mini-notes-summary-darwin-arm64.tar.gz
            release/mini-notes-summary-darwin-arm64.tar.gz.sha256
            release/mini-notes-summary-darwin-x86_64.tar.gz
            release/mini-notes-summary-darwin-x86_64.tar.gz.sha256
            release/mini-notes-summary-windows-x86_64.zip
            release/mini-notes-summary-windows-x86_64.zip.sha256
